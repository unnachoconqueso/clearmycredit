<!DOCTYPE html>
<html>
<head>
  <title>ClearMyCredit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f7fb;
      margin: 0;
    }

    .container {
      max-width: 480px;
      margin: 80px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #666;
      margin-bottom: 20px;
    }

    select, button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 16px;
    }

    button {
      background: #0070f3;
      color: white;
      border: none;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Fix Your Credit Fast</h1>
    <p>Generate a professional dispute letter in seconds</p>

    <select id="reason">
      <option>Account not mine</option>
      <option>Incorrect late payment</option>
      <option>Paid debt still showing</option>
      <option>Duplicate account</option>
      <option>Identity theft</option>
    </select>

    <button onclick="goToForm()">Generate My Letter</button>
  </div>

  <script>
    function goToForm() {
      const reason = document.getElementById("reason").value;
      localStorage.setItem("reason", reason);
      window.location.href = "form.html";
    }
  </script>
</body>
</html>
