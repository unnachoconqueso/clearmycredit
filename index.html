<!DOCTYPE html>  
<html>  
<head>  
  <style>
  body {
    font-family: Arial, sans-serif;
    background: #f7f7f7;
    padding: 20px;
  }

  .container {
    max-width: 500px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
  }

  button {
    background: #0070f3;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 6px;
    width: 100%;
    font-size: 16px;
    margin-top: 10px;
  }

  input, select {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
  }
</style>
  <title>ClearMyCredit</title>  
</head>  
<body>  
  
<h1>ClearMyCredit</h1>  
<p>Select your dispute reason:</p>  
  
<select id="reason">  
  <option value="Account not mine">Account not mine</option>  
  <option value="Incorrect late payment">Incorrect late payment</option>  
  <option value="Paid debt still showing">Paid debt still showing</option>  
  <option value="Duplicate account">Duplicate account</option>  
  <option value="Identity theft">Identity theft</option>  
</select>  
  
<br><br>  
  
<button onclick="goToForm()">Generate My Letter</button>  
  
<script>  
function goToForm() {  
  const reason = document.getElementById("reason").value;  
  localStorage.setItem("selectedReason", reason);  
  window.location.href = "form.html";  
}  
</script>  
  
</body>  
</html>
