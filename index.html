<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClearMyCredit</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; --text-light: #64748b; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; text-align: center; }
        .lang-switcher { text-align: right; margin-bottom: 20px; }
        .lang-btn { background: none; border: 1px solid #ccc; cursor: pointer; padding: 5px 10px; border-radius: 5px; font-size: 0.8rem; }
        .lang-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 1rem; }
        .subtitle { font-size: 1.25rem; color: var(--text-light); margin-bottom: 2rem; }
        .cta-button { display: inline-block; background: var(--primary); color: white; padding: 16px 32px; border-radius: 12px; font-weight: 700; text-decoration: none; }
        .footer { margin-top: 60px; font-size: 0.75rem; color: var(--text-light); text-align: left; border-top: 1px solid #e2e8f0; padding-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="lang-switcher">
            <button class="lang-btn" onclick="setLang('en')" id="btn-en">English</button>
            <button class="lang-btn" onclick="setLang('es')" id="btn-es">Español</button>
        </div>

        <h1 data-en="Generate a credit dispute letter in minutes" data-es="Genera tu carta de disputa en minutos">Generate a credit dispute letter in minutes</h1>
        <p class="subtitle" data-en="Answer a few questions and generate a professional letter to start the process of disputing errors." data-es="Responde unas preguntas y obtén una carta profesional para iniciar el proceso de disputa.">Answer a few questions and generate a professional letter to start the process of disputing errors.</p>
        
        <a href="form.html" class="cta-button" data-en="Generate My Letter" data-es="Generar mi carta">Generate My Letter</a>

        <footer class="footer">
            <p data-en="Legal Disclaimer: This letter is a tool to help you dispute errors. No results are guaranteed." data-es="Aviso Legal: Esta carta es una herramienta para ayudarte a disputar errores. No se garantizan resultados.">Legal Disclaimer: This letter is a tool to help you dispute errors. No results are guaranteed.</p>
        </footer>
    </div>

    <script>
        function setLang(lang) {
            localStorage.setItem('lang', lang);
            document.querySelectorAll('[data-' + lang + ']').forEach(el => {
                el.textContent = el.getAttribute('data-' + lang);
            });
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + lang).classList.add('active');
        }
        // Cargar idioma preferido o por defecto inglés
        setLang(localStorage.getItem('lang') || 'en');
    </script>
</body>
</html>
