<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Information | ClearMyCredit</title>
    <style>
        :root {
            --primary: #0070f3;
            --bg: #f5f7fb;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .step-indicator {
            font-size: 0.875rem;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        h2 {
            margin: 0 0 24px 0;
            font-size: 1.5rem;
            font-weight: 800;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: #475569;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 112, 243, 0.1);
        }

        .hint {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 4px;
            display: block;
        }

        .submit-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 10px;
            font-size: 1.125rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s, transform 0.1s;
        }

        .submit-btn:hover {
            background: #0061d1;
        }

        .submit-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <div class="step-indicator">Step 1 of 2</div>
            <h2>Dispute Details</h2>
            
            <form id="disputeForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required placeholder="As it appears on your ID">
                </div>

                <div class="form-group">
                    <label for="address">Mailing Address</label>
                    <input type="text" id="address" required placeholder="Street, City, State, ZIP">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="name@example.com">
                </div>

                <hr style="border: 0; border-top: 1px solid #f1f5f9; margin: 25px 0;">

                <div class="form-group">
                    <label for="creditor">Bank / Company Name</label>
                    <input type="text" id="creditor" required placeholder="e.g., Chase, Wells Fargo, AT&T">
                </div>

                <div class="form-group">
                    <label for="account">Account Number</label>
                    <input type="text" id="account" required placeholder="e.g., 123456XXXX">
                    <span class="hint">Use the format shown on your credit report.</span>
                </div>

                <div class="form-group">
                    <label for="issue">Type of Error</label>
                    <select id="issue" required>
                        <option value="" disabled selected>Select the issue...</option>
                        <option value="Late payment reported incorrectly">Late payment reported incorrectly</option>
                        <option value="Account doesn't belong to me">Account doesn't belong to me</option>
                        <option value="Paid debt still appearing">Paid debt still appearing</option>
                        <option value="Duplicate account">Duplicate account</option>
                        <option value="Other">Other (Please describe below)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="description">Brief Explanation (Optional)</label>
                    <textarea id="description" rows="2" placeholder="e.g.,
