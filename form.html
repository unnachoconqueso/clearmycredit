<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClearMyCredit | Dispute Details</title>
    <style>
        :root { 
            --primary: #2563eb; 
            --primary-hover: #1d4ed8; 
            --bg: #f8fafc; 
            --surface: #ffffff; 
            --text-main: #0f172a; 
            --text-muted: #64748b; 
            --border: #e2e8f0; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg); 
            color: var(--text-main); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 20px; 
        }
        .card { 
            background: var(--surface); 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 500px; 
            border: 1px solid var(--border); 
        }
        .step { 
            font-size: 0.875rem; 
            color: var(--primary); 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 0.05em; 
            margin-bottom: 8px; 
            display: block; 
        }
        h2 { margin: 0 0 24px 0; font-size: 1.75rem; font-weight: 800; letter-spacing: -0.02em; }
        .group { margin-bottom: 20px; }
        label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 8px; color: var(--text-main); }
        input, select, textarea { 
            width: 100%; 
            padding: 12px 16px; 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            font-size: 1rem; 
            color: var(--text-main); 
            background-color: var(--bg); 
            transition: all 0.2s; 
            outline: none; 
            font-family: inherit; 
        }
        input:focus, select:focus, textarea:focus { 
            border-color: var(--primary); 
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); 
            background-color: var(--surface); 
        }
        .hidden { display: none; }
        .notice { 
            background: #f0fdf4; 
            border: 1px solid #bbf7d0; 
            padding: 16px; 
            border-radius: 8px; 
            margin: 24px 0; 
            font-size: 0.875rem; 
            color: #166534; 
            display: flex; 
            gap: 12px; 
            align-items: flex-start; 
        }
        .notice svg { flex-shrink: 0; width: 20px; height: 20px; color: #15803d; }
        .btn { 
            width: 100%; 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 18px; 
            border-radius: 12px; 
            font-size: 1.125rem; 
            font-weight: 700; 
            cursor: pointer; 
            transition: background 0.2s, transform 0.1s; 
        }
        .btn:hover { background: var(--primary-hover); }
        .btn:active { transform: scale(0.98); }
        .back-link { 
            display: inline-block; 
            margin-bottom: 20px; 
            color: var(--text-muted); 
            text-decoration: none; 
            font-size: 0.875rem; 
            font-weight: 500; 
        }
        .back-link:hover { color: var(--text-main); }
    </style>
</head>
<body>

    <div class="card">
        <a href="index.html" class="back-link">&larr; Back</a>
        <span class="step">Step 1 of 2</span>
        <h2>Dispute Details</h2>
        
        <form id="disputeForm">
            <div class="group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="As it appears on your ID" required>
            </div>

            <div class="group">
                <label for="address">Mailing Address</label>
                <input type="text" id="address" placeholder="Street, City, State, ZIP" required>
            </div>

            <div class="group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>

            <div class="group">
                <label for="creditor">Bank / Company Name</label>
                <input type="text" id="creditor" placeholder="e.g., Chase, Wells Fargo" required>
            </div>

            <div class="group">
                <label for="account">Account Number</label>
                <input type="text" id="account" placeholder="Partial or full account number" required>
            </div>

            <div class="group">
                <label for="issue">Dispute Reason</label>
                <select id="issue" required>
                    <option value="" disabled selected>Select the issue...</option>
                    <option value="Late payment reported incorrectly">Late payment reported incorrectly</option>
                    <option value="Account doesn't belong to me">Account doesn't belong to me</option>
                    <option value="Paid debt still appearing">Paid debt still appearing</option>
                    <option value="Duplicate account">Duplicate account</option>
                    <option value="Other">Other (Please specify)</option>
                </select>
            </div>

            <div class="group hidden" id="other-issue-group">
                <label for="other-issue">Specify the exact issue</label>
                <textarea id="other-issue" rows="3" placeholder="Explain the inaccuracy clearly..."></textarea>
            </div>

            <div class="notice">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <div><strong>Note:</strong> You will be redirected to our secure payment partner to complete your $9 purchase.</div>
            </div>

            <button type="submit" class="btn">Proceed to Payment – $9</button>
        </form>
    </div>

    <script>
        const issueSelect = document.getElementById('issue');
        const otherIssueGroup = document.getElementById('other-issue-group');
        const otherIssueInput = document.getElementById('other-issue');

        // Mostrar campo extra si se selecciona "Other"
        issueSelect.addEventListener('change', function() {
            if (this.value === 'Other') {
                otherIssueGroup.classList.remove('hidden');
                otherIssueInput.setAttribute('required', 'true');
            } else {
                otherIssueGroup.classList.add('hidden');
                otherIssueInput.removeAttribute('required');
                otherIssueInput.value = '';
            }
        });

        // Manejar el envío del formulario
        document.getElementById('disputeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const selectedIssue = issueSelect.value;
            const finalIssue = selectedIssue === 'Other' ? otherIssueInput.value : selectedIssue;

            // Guardar datos en localStorage para usarlos en result.html después del pago
            localStorage.setItem("cmc_name", document.getElementById('name').value);
            localStorage.setItem("cmc_address", document.getElementById('address').value);
            localStorage.setItem("cmc_email", document.getElementById('email').value);
            localStorage.setItem("cmc_creditor", document.getElementById('creditor').value);
            localStorage.setItem("cmc_account", document.getElementById('account').value);
            localStorage.setItem("cmc_issue", finalIssue);
            
            // Redirigir directamente al Payment Link de Stripe
            window.location.href = "https://buy.stripe.com/8x28wRgI90gveqhfjQbwk01";
        });
    </script>
</body>
</html>
