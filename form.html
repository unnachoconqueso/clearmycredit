<!DOCTYPE html>
<html>
<head>
  <title>Your Info</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: -apple-system, sans-serif;
      background: #f5f7fb;
    }

    .container {
      max-width: 480px;
      margin: 50px auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
    }

    input, button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    button {
      background: #0070f3;
      color: white;
      border: none;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>Your Information</h2>

    <input id="name" placeholder="Full Name">
    <input id="address" placeholder="Address">
    <input id="creditor" placeholder="Bank / Company Name">
    <input id="account" placeholder="Account Number">

    <button onclick="generate()">Continue</button>
  </div>

  <script>
    function generate() {
      localStorage.setItem("name", document.getElementById("name").value);
      localStorage.setItem("address", document.getElementById("address").value);
      localStorage.setItem("creditor", document.getElementById("creditor").value);
      localStorage.setItem("account", document.getElementById("account").value);

      window.location.href = "result.html";
    }
  </script>
</body>
</html>
