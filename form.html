<!-- form.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ClearMyCredit | Information Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f4f7fc;
            padding: 2rem 1rem;
            color: #1a2c3e;
        }

        .container {
            max-width: 780px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 2rem 1.5rem 2.5rem;
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            margin-bottom: 0.5rem;
            color: #0b2b3b;
        }

        .subhead {
            font-size: 1rem;
            color: #4a627a;
            border-left: 4px solid #2c7da0;
            padding-left: 1rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #0f3b4f;
        }

        input, select, textarea {
            width: 100%;
            padding: 0.85rem 1rem;
            font-size: 1rem;
            border: 1.5px solid #e0e9f0;
            border-radius: 20px;
            background: #ffffff;
            transition: 0.2s;
            font-family: inherit;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #2c7da0;
            box-shadow: 0 0 0 3px rgba(44,125,160,0.2);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-top: 0.5rem;
        }

        .radio-group label {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: normal;
            cursor: pointer;
        }

        input[type="radio"] {
            width: auto;
            transform: scale(1.1);
            margin-right: 0.25rem;
        }

        .other-reason {
            margin-top: 1rem;
            display: none;
        }

        .other-reason.show {
            display: block;
        }

        .btn-submit {
            background: #2c7da0;
            color: white;
            border: none;
            width: 100%;
            padding: 1rem;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 1rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        .btn-submit:hover {
            background: #1f5e7a;
            transform: scale(0.98);
        }

        .error-message {
            color: #c7362b;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        hr {
            margin: 2rem 0 1rem;
            border: 0;
            height: 1px;
            background: #e2edf2;
        }

        .info-note {
            background: #eef3fa;
            padding: 1rem;
            border-radius: 24px;
            font-size: 0.85rem;
            text-align: center;
            color: #2c5a74;
        }

        @media (max-width: 550px) {
            .container {
                padding: 1.5rem;
            }
            h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>✍️ ClearMyCredit</h1>
    <div class="subhead">Generate your FCRA-compliant dispute letter — one‑time $9</div>

    <form id="disputeForm">
        <div class="form-group">
            <label>Full name *</label>
            <input type="text" id="fullName" placeholder="John A. Doe" autocomplete="name">
        </div>

        <div class="form-group">
            <label>Street address (for letter header) *</label>
            <input type="text" id="address" placeholder="123 Main St, Apt 4B, City, State ZIP" autocomplete="address-line1">
        </div>

        <div class="form-group">
            <label>Email address *</label>
            <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
        </div>

        <div class="form-group">
            <label>Creditor / Bank name *</label>
            <input type="text" id="creditor" placeholder="e.g., Chase Bank, Portfolio Recovery Associates">
        </div>

        <div class="form-group">
            <label>Account number (last 4 or full) *</label>
            <input type="text" id="accountNumber" placeholder="XXXXXXXX1234">
        </div>

        <div class="form-group">
            <label>Dispute reason *</label>
            <div class="radio-group">
                <label><input type="radio" name="disputeReason" value="Not my account"> Not my account</label>
                <label><input type="radio" name="disputeReason" value="Wrong amount / balance"> Wrong amount / balance</label>
                <label><input type="radio" name="disputeReason" value="Already paid / settled"> Already paid / settled</label>
                <label><input type="radio" name="disputeReason" value="Outdated information"> Outdated information</label>
                <label><input type="radio" name="disputeReason" value="other"> Other (describe below)</label>
            </div>
            <div id="otherReasonContainer" class="other-reason">
                <textarea id="otherReasonText" rows="2" placeholder="Please describe the specific error or reason for dispute..."></textarea>
            </div>
        </div>

        <div class="form-group">
            <label>Language preference</label>
            <div class="radio-group">
                <label><input type="radio" name="lang" value="en" checked> English</label>
                <label><input type="radio" name="lang" value="es"> Español</label>
            </div>
        </div>

        <button type="submit" class="btn-submit">Continue to secure payment →</button>
        <div class="info-note">
            🔒 $9 one-time. After payment you’ll get an instant professional dispute letter ready to print & mail.
        </div>
    </form>
</div>

<script>
    (function() {
        const form = document.getElementById('disputeForm');
        const otherRadio = document.querySelector('input[value="other"]');
        const otherContainer = document.getElementById('otherReasonContainer');
        const otherTextarea = document.getElementById('otherReasonText');

        // Toggle "other" reason textarea
        function toggleOtherReason() {
            if (otherRadio && otherRadio.checked) {
                otherContainer.classList.add('show');
                otherTextarea.setAttribute('required', 'required');
            } else {
                otherContainer.classList.remove('show');
                otherTextarea.removeAttribute('required');
            }
        }
        const radios = document.querySelectorAll('input[name="disputeReason"]');
        radios.forEach(radio => radio.addEventListener('change', toggleOtherReason));
        toggleOtherReason(); // initial

        // Validation helper
        function validateField(value, fieldName) {
            if (!value || value.trim() === '') {
                return `${fieldName} is required.`;
            }
            return null;
        }

        function validateEmail(email) {
            const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
            if (!emailRegex.test(email)) {
                return "Please enter a valid email address (e.g., name@domain.com).";
            }
            return null;
        }

        // Submit handler: save to localStorage, then redirect to Stripe test link
        form.addEventListener('submit', (e) => {
            e.preventDefault();

            // Gather values
            const fullName = document.getElementById('fullName').value.trim();
            const address = document.getElementById('address').value.trim();
            const email = document.getElementById('email').value.trim();
            const creditor = document.getElementById('creditor').value.trim();
            const account = document.getElementById('accountNumber').value.trim();

            // Determine dispute issue
            let selectedReason = null;
            for (let radio of radios) {
                if (radio.checked) {
                    if (radio.value === 'other') {
                        selectedReason = otherTextarea.value.trim();
                        if (!selectedReason) {
                            alert("Please describe the dispute reason in the text field.");
                            otherTextarea.focus();
                            return;
                        }
                    } else {
                        selectedReason = radio.value;
                    }
                    break;
                }
            }

            // Get language
            let lang = 'en';
            const langRadios = document.querySelectorAll('input[name="lang"]');
            for (let r of langRadios) {
                if (r.checked) {
                    lang = r.value;
                    break;
                }
            }

            // Validation errors array
            let errors = [];
            errors.push(validateField(fullName, "Full name"));
            errors.push(validateField(address, "Street address"));
            errors.push(validateField(email, "Email address"));
            errors.push(validateField(creditor, "Creditor name"));
            errors.push(validateField(account, "Account number"));
            errors.push(validateField(selectedReason, "Dispute reason"));

            const emailErr = validateEmail(email);
            if (emailErr) errors.push(emailErr);

            const finalErrors = errors.filter(err => err !== null);
            if (finalErrors.length > 0) {
                alert("⚠️ Please fix the following:\n- " + finalErrors.join("\n- "));
                return;
            }

            // Save to localStorage exactly as PRD spec
            localStorage.setItem('cmc_name', fullName);
            localStorage.setItem('cmc_address', address);
            localStorage.setItem('cmc_creditor', creditor);
            localStorage.setItem('cmc_account', account);
            localStorage.setItem('cmc_issue', selectedReason);
            localStorage.setItem('lang', lang);
            // optional: store email for reference if needed later
            localStorage.setItem('cmc_email', email);

            // NEW STRIPE TEST LINK (provided by PRD)
            const stripeTestLink = 'https://buy.stripe.com/test_aFa9AV4ZK2vu9DRaPEbbG00';

            // Redirect to Stripe checkout (test mode)
            window.location.href = stripeTestLink;
        });
    })();
</script>
</body>
</html>
