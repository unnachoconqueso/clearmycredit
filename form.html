<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tus Datos | ClearMyCredit</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 450px; }
        .step { font-size: 0.8rem; color: var(--primary); font-weight: 700; text-transform: uppercase; margin-bottom: 10px; }
        h2 { margin: 0 0 20px 0; }
        .group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; color: #475569; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-family: inherit; }
        .notice { background: #fff7ed; border: 1px solid #ffedd5; padding: 10px; border-radius: 8px; margin: 20px 0; font-size: 0.75rem; color: #9a3412; }
        .btn { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>
    <div class="card">
        <div class="step">Paso 1 de 2</div>
        <h2>Detalles de la disputa</h2>
        <form id="disputeForm">
            <div class="group">
                <label>Nombre Completo</label>
                <input type="text" id="name" required placeholder="Como aparece en tu ID">
            </div>
            <div class="group">
                <label>Dirección Física</label>
                <input type="text" id="address" required placeholder="Calle, Ciudad, Estado, ZIP">
            </div>
            <div class="group">
                <label>Correo Electrónico</label>
                <input type="email" id="email" required placeholder="tu@email.com">
            </div>
            <div class="group">
                <label>Nombre del Banco / Acreedor</label>
                <input type="text" id="creditor" required placeholder="Ej: Chase, Wells Fargo">
            </div>
            <div class="group">
                <label>Número de Cuenta</label>
                <input type="text" id="account" required placeholder="Ej: 123456XXXX">
            </div>
            <div class="group">
                <label>Tipo de Error</label>
                <select id="issue" required>
                    <option value="" disabled selected>Selecciona el problema...</option>
                    <option value="Late payment reported incorrectly">Pago atrasado incorrecto</option>
                    <option value="Account doesn't belong to me">Cuenta no me pertenece</option>
                    <option value="Paid debt still appearing">Deuda pagada aún aparece</option>
                    <option value="Other">Otro</option>
                </select>
            </div>
            <div class="notice">
                <strong>Aviso:</strong> Estás adquiriendo una plantilla de carta de disputa, no una garantía de mejora crediticia.
            </div>
            <button type="submit" class="btn">Generar Carta – $9</button>
        </form>
    </div>
    <script>
        document.getElementById('disputeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                address: document.getElementById('address').value,
                email: document.getElementById('email').value,
                creditor: document.getElementById('creditor').value,
                account: document.getElementById('account').value,
                issue: document.getElementById('issue').value
            };
            Object.keys(data).forEach(key => localStorage.setItem(key, data[key]));
            window.location.href = "result.html";
        });
    </script>
</body>
</html>
