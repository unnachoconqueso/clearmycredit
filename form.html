<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tus Datos | ClearMyCredit</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .step-indicator {
            font-size: 0.8rem;
            color: var(--primary);
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 0.05em;
        }

        h2 {
            margin: 0 0 24px 0;
            font-size: 1.5rem;
            font-weight: 800;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: #475569;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            font-family: inherit;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .notice {
            background: #fff7ed;
            border: 1px solid #ffedd5;
            padding: 12px;
            border-radius: 8px;
            margin: 20px 0;
            font-size: 0.75rem;
            color: #9a3412;
            line-height: 1.4;
        }

        .submit-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }

        .submit-btn:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <div class="step-indicator">Paso 1 de 2</div>
            <h2>Detalles de la disputa</h2>
            
            <form id="disputeForm">
                <div class="form-group">
                    <label for="name">Nombre Completo</label>
                    <input type="text" id="name" required placeholder="Como aparece en tu ID">
                </div>

                <div class="form-group">
                    <label for="address">Dirección de Envío</label>
                    <input type="text" id="address" required placeholder="Calle, Ciudad, Estado, ZIP">
                </div>

                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" required placeholder="tu@email.com">
                </div>

                <div class="form-group">
                    <label for="creditor">Banco o Acreedor</label>
                    <input type="text" id="creditor" required placeholder="Ej: Chase, Wells Fargo, AT&T">
                </div>

                <div class="form-group">
                    <label for="account">Número de Cuenta</label>
                    <input type="text" id="account" required placeholder="Ej: 123456XXXX">
                </div>

                <div class="form-group">
                    <label for="issue">Tipo de Error</label>
                    <select id="issue" required>
                        <option value="" disabled selected>Selecciona el problema...</option>
                        <option value="Late payment reported incorrectly">Pago atrasado incorrecto</option>
                        <option value="Account doesn't belong to me">Cuenta no me pertenece</option>
                        <option value="Paid debt still appearing">Deuda pagada aún aparece</option>
                        <option value="Duplicate account">Cuenta duplicada</option>
                        <option value="Other">Otro (explicar abajo)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="description">Explicación Breve (Opcional)</label>
                    <textarea id="description" rows="3" placeholder="Ej: Nunca estuve tarde en este pago..."></textarea>
                </div>

                <div class="notice">
                    <strong>Importante:</strong> Estás generando una plantilla de disputa. No garantizamos resultados específicos ni mejoras en tu puntaje crediticio.
                </div>

                <button type="submit" class="submit-btn">Generar Carta – $9</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('disputeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const data = {
                name: document.getElementById('name').value.trim(),
                address: document.getElementById('address').value.trim(),
                email: document.getElementById('email').value.trim(),
                creditor: document.getElementById('creditor').value.trim(),
                account: document.getElementById('account').value.trim(),
                issue: document.getElementById('issue').value,
                description: document.getElementById('description').value.trim()
            };

            // Guardar datos para que result.html los lea
            localStorage.setItem("name", data.name);
            localStorage.setItem("address", data.address);
            localStorage.setItem("email", data.email);
            localStorage.setItem("creditor", data.creditor);
            localStorage.setItem("account", data.account);
            localStorage.setItem("issue", data.issue);
            localStorage.setItem("description", data.description);

            // Redirigir a resultados
            window.location.href = "result.html";
        });
    </script>

</body>
</html>
