<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 1: Your Details | ClearMyCredit</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; margin: 20px; }
        .step-indicator { font-size: 0.875rem; color: var(--primary); font-weight: 600; margin-bottom: 8px; }
        h2 { margin: 0 0 24px 0; font-size: 1.5rem; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 6px; }
        input, select {
            width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px;
            font-size: 1rem; box-sizing: border-box;
        }
        input:focus { outline: 2px solid var(--primary); border-color: transparent; }
        .submit-btn {
            width: 100%; background: var(--primary); color: white; border: none;
            padding: 14px; border-radius: 8px; font-size: 1rem; font-weight: 700;
            cursor: pointer; margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="step-indicator">Step 1 of 2</div>
        <h2>Tell us about your credit issue</h2>
        
        <form id="disputeForm">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="john@example.com">
            </div>
            <div class="form-group">
                <label for="issue">Primary Credit Issue</label>
                <select id="issue" name="issue" required>
                    <option value="" disabled selected>Select an issue...</option>
                    <option value="Late payment">Late payment</option>
                    <option value="Collection">Collection</option>
                    <option value="Identity error">Identity error</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <button type="submit" class="submit-btn">Continue</button>
        </form>
    </div>

    <script>
        document.getElementById('disputeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Captura de datos
            const userData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                issue: document.getElementById('issue').value
            };

            // Guardado en localStorage
            localStorage.setItem('clearmycredit_user_data', JSON.stringify(userData));

            // Redirección
            window.location.href = "result.html";
        });
    </script>
</body>
</html>
