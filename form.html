<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form | ClearMyCredit</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 450px; }
        .group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; background: var(--primary); color: white; border: none; padding: 16px; border-radius: 10px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2 data-en="Dispute Details" data-es="Detalles de la disputa">Dispute Details</h2>
        <form id="disputeForm">
            <div class="group">
                <label data-en="Full Name" data-es="Nombre Completo">Full Name</label>
                <input type="text" id="name" required>
            </div>
            <div class="group">
                <label data-en="Bank Name" data-es="Nombre del Banco">Bank Name</label>
                <input type="text" id="creditor" required>
            </div>
            <div class="group">
                <label data-en="Account Number" data-es="Número de Cuenta">Account Number</label>
                <input type="text" id="account" required>
            </div>
            <div class="group">
                <label data-en="Type of Error" data-es="Tipo de Error">Type of Error</label>
                <select id="issue" required>
                    <option value="Late payment reported incorrectly" data-en="Late payment reported incorrectly" data-es="Pago atrasado incorrecto">Late payment reported incorrectly</option>
                    <option value="Account doesn't belong to me" data-en="Account doesn't belong to me" data-es="Cuenta no me pertenece">Account doesn't belong to me</option>
                </select>
            </div>
            <button type="submit" class="btn" data-en="Continue – $9" data-es="Continuar – $9">Continue – $9</button>
        </form>
    </div>

    <script>
        const lang = localStorage.getItem('lang') || 'en';
        document.querySelectorAll('[data-' + lang + ']').forEach(el => {
            if(el.tagName === 'OPTION') el.textContent = el.getAttribute('data-' + lang);
            else el.textContent = el.getAttribute('data-' + lang);
        });

        document.getElementById('disputeForm').addEventListener('submit', (e) => {
            e.preventDefault();
            localStorage.setItem("name", document.getElementById('name').value);
            localStorage.setItem("creditor", document.getElementById('creditor').value);
            localStorage.setItem("account", document.getElementById('account').value);
            localStorage.setItem("issue", document.getElementById('issue').value);
            window.location.href = "result.html";
        });
    </script>
</body>
</html>
