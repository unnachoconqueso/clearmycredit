<!DOCTYPE html>
<html>
<head>
  <title>Your Info</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: -apple-system, sans-serif;
      background: #f5f7fb;
    }

    .container {
      max-width: 480px;
      margin: 50px auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
    }

    input, button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    button {
      background: #0070f3;
      color: white;
      border: none;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>Your Information</h2>

    <input id="name" placeholder="Full Name">
    <input id="address" placeholder="Address">
    <input id="creditor" placeholder="Bank / Company Name">
    <input id="account" placeholder="Account Number">

    <button onclick="generate()">Continue</button>
  </div>
<script>
  function generate() {
    const name = document.getElementById("name").value.trim();
    const address = document.getElementById("address").value.trim();
    const creditor = document.getElementById("creditor").value.trim();
    const account = document.getElementById("account").value.trim();

    if (!name || !address || !creditor || !account) {
      alert("Please fill out all fields");
      return;
    }

    localStorage.setItem("name", name);
    localStorage.setItem("address", address);
    localStorage.setItem("creditor", creditor);
    localStorage.setItem("account", account);

    window.location.href = "./result.html";
  }
</script>
  
</body>
</html>
