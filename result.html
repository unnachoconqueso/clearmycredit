<!DOCTYPE html>  
<html>  
<head>  
  <style>
  body {
    font-family: Arial, sans-serif;
    background: #f7f7f7;
    padding: 20px;
  }

  .container {
    max-width: 500px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
  }

  button {
    background: #0070f3;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 6px;
    width: 100%;
    font-size: 16px;
    margin-top: 10px;
  }

  input, select {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
  }
</style>
  <title>Your Letter</title>  
</head>  
<body>  
  <div class="container">
    <h1>CleaMyCredit</h1>
<h2>Your Dispute Letter</h2>  
  
<div id="letter" style="white-space: pre-wrap; border:1px solid black; padding:15px;"></div>  
  
<br>  
  
<button onclick="copyText()">Copy Letter</button>  
  
<script>  
const letter = localStorage.getItem("finalLetter");  
document.getElementById("letter").innerText = letter;  
  
function copyText() {  
  navigator.clipboard.writeText(letter);  
  alert("Letter copied!");  
}  
</script>  
  </div>
</body>  
</html>
