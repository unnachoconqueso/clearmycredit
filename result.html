<!DOCTYPE html>
<html>
<head>
  <title>Your Letter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: -apple-system, sans-serif;
      background: #f5f7fb;
    }

    .container {
      max-width: 600px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
    }

    .letter {
      white-space: pre-line;
      margin-top: 20px;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      background: #0070f3;
      color: white;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>Your Dispute Letter</h2>

    <div class="letter" id="letter"></div>

    <button onclick="alert('Payment step coming next')">Download PDF</button>
  </div>

  <script>
    const name = localStorage.getItem("name");
    const address = localStorage.getItem("address");
    const creditor = localStorage.getItem("creditor");
    const account = localStorage.getItem("account");
    const reason = localStorage.getItem("reason");

    const letter = `
${name}
${address}

Re: Account ${account}

To whom it may concern,

I am writing to dispute the following item on my credit report: ${reason}.

This account with ${creditor} is inaccurate and should be removed or corrected immediately.

Please investigate this matter and provide a response within 30 days.

Sincerely,
${name}
`;

    document.getElementById("letter").innerText = letter;
  </script>
</body>
</html>
