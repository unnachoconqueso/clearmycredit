<script>
        // Llenar la carta con los datos guardados
        window.addEventListener('DOMContentLoaded', () => {
            const name = localStorage.getItem('cmc_name') || '[Your Name]';
            const address = localStorage.getItem('cmc_address') || '[Your Address]';
            const creditor = localStorage.getItem('cmc_creditor') || '[Creditor Name]';
            const account = localStorage.getItem('cmc_account') || '[Account Number]';
            const issue = localStorage.getItem('cmc_issue') || '[Dispute Reason]';
            
            const currentDate = new Date().toLocaleDateString('en-US', { 
                year: 'numeric', month: 'long', day: 'numeric' 
            });

            document.getElementById('l-name').textContent = name;
            document.getElementById('l-address').textContent = address;
            document.getElementById('l-date').textContent = currentDate;
            document.getElementById('l-cred').textContent = creditor;
            document.getElementById('l-acc').textContent = account;
            document.getElementById('l-issue').textContent = issue;
            document.getElementById('l-sign-name').textContent = name;

            // --- NUEVA LÓGICA DE STRIPE ---
            // Verificar si el usuario acaba de pagar (revisando la URL)
            const urlParams = new URLSearchParams(window.location.search);
            
            if (urlParams.get('status') === 'success') {
                // El pago fue exitoso, quitamos el candado
                document.getElementById('paywall').style.display = 'none';
                document.getElementById('letter-wrapper').classList.remove('is-locked');
                
                // Actualizar el mensaje de arriba
                document.querySelector('.success-card h1').textContent = "✅ Payment Successful!";
                document.querySelector('.success-card p').innerHTML = "Your letter is unlocked. <strong>Press Ctrl+P (or Cmd+P) to save as PDF.</strong>";
                
                // Mostrar el botón real para imprimir/descargar PDF
                const printBtn = document.createElement('button');
                printBtn.className = 'btn';
                printBtn.style.marginTop = '20px';
                printBtn.textContent = 'Print / Save as PDF';
                printBtn.onclick = () => window.print();
                document.querySelector('.success-card').appendChild(printBtn);
            }
        });

        // Función que redirige al usuario a tu checkout de Stripe
        function unlockLetter() {
            window.location.href = "https://buy.stripe.com/8x28wRgI90gveqhfjQbwk01";
        }

        // Bloquear impresión si no han pagado
        window.onbeforeprint = () => {
            if (document.getElementById('letter-wrapper').classList.contains('is-locked')) {
                alert("Please complete your purchase to enable printing.");
                return false;
            }
        };
    </script>
