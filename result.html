<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClearMyCredit | Your Letter</title>
    <style>
        :root { --primary: #2563eb; --primary-hover: #1d4ed8; --bg: #f8fafc; --surface: #ffffff; --text-main: #0f172a; --text-muted: #64748b; --border: #e2e8f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text-main); }
        
        /* UI Elements */
        .ui-container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .success-card { background: var(--surface); padding: 40px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid var(--border); text-align: center; margin-bottom: 40px; }
        .success-card h1 { font-size: 2rem; margin-bottom: 16px; letter-spacing: -0.02em; }
        
        .btn { display: inline-block; background: var(--primary); color: white; padding: 16px 32px; border-radius: 10px; font-size: 1.125rem; font-weight: 700; border: none; cursor: pointer; text-decoration: none; transition: all 0.2s; }
        .btn:hover { background: var(--primary-hover); transform: translateY(-1px); }

        /* Paywall & Letter Protection */
        .letter-preview-container { position: relative; max-width: 8.5in; margin: 0 auto 60px auto; overflow: hidden; border-radius: 8px; border: 1px solid var(--border); }
        
        .paywall-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(2px);
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
        }

        .paywall-content {
            background: white;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            max-width: 400px;
            border: 1px solid var(--border);
        }

        .is-locked {
            filter: blur(10px);
            user-select: none;
            pointer-events: none;
            opacity: 0.6;
        }

        /* Letter Styling (The actual document) */
        .letter-preview-wrapper { background: white; padding: 1in; }
        #letter-content { font-family: "Times New Roman", Times, serif; font-size: 12pt; line-height: 1.5; color: black; text-align: left; }
        #letter-content p { margin-bottom: 12pt; }
